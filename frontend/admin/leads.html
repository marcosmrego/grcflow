<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads — Painel da Plataforma · GRC Flow</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/admin-sidebar.css">
</head>
<body>
    <div class="container-fluid">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="navbar-brand">
                <div class="logo">
                    <span class="logo-icon">🛠️</span>
                    <span class="logo-text">GRC Flow — Painel da Plataforma</span>
                </div>
            </div>
            <ul class="nav-links">
                <li>
                    <a href="companies.html" class="nav-link">🏢 Empresas</a>
                    <ul class="nav-sublinks">
                        <li><a href="companies.html" class="nav-sublink">+ Nova Empresa</a></li>
                    </ul>
                </li>
                <li><a href="leads.html" class="nav-link active">📨 Leads</a></li>
            </ul>
            <div class="navbar-footer">
                <span class="nav-link" style="color:var(--text-muted);cursor:default" id="user-info"></span>
                <a href="#" class="nav-link" id="logout-link">🚪 Sair</a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="dashboard-header">
                <div>
                    <h1>📨 Leads</h1>
                    <p class="subtitle">Contatos capturados pela landing page de marketing</p>
                </div>
            </header>

            <!-- Filter Bar -->
            <div class="card" style="margin-bottom: 2rem;">
                <div class="card-body">
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" class="form-control" id="search-input"
                                   placeholder="🔍 Buscar por nome, e-mail ou empresa...">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Leads Container -->
            <div class="card">
                <div class="card-header">
                    <h2>Leads Recebidos</h2>
                    <span id="lead-count" style="color: var(--text-secondary);">0 leads</span>
                </div>
                <div class="card-body">
                    <div class="table-responsive" style="overflow-x:auto;">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>E-mail</th>
                                    <th>Empresa</th>
                                    <th>Telefone</th>
                                    <th>Origem</th>
                                    <th>Data</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="leads-table-body">
                                <tr><td colspan="7"><div class="loading">Carregando leads...</div></td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div id="leads-pagination" style="display:flex; justify-content:center; align-items:center; gap:1rem; margin-top:1.5rem;"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/admin-api.js"></script>
    <script src="../js/admin-leads.js"></script>
</body>
</html>
