<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — GRC Flow</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-primary); }
        .login-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 400px; }
        .login-logo { text-align: center; margin-bottom: 2rem; }
        .login-logo .logo-icon { font-size: 2.5rem; }
        .login-logo h1 { font-size: 1.5rem; margin: 0.5rem 0 0.25rem; }
        .login-logo p { color: var(--text-muted); font-size: 0.875rem; margin: 0; }
        .login-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; border-radius: 6px; padding: 0.75rem 1rem; font-size: 0.875rem; margin-bottom: 1rem; display: none; }
        .btn-full { width: 100%; justify-content: center; }
        .login-footer { text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon">⚙️</div>
            <h1>GRC Flow</h1>
            <p>Governança, Risco e Compliance</p>
        </div>

        <div class="login-error" id="login-error"></div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="email">E-mail</label>
                <input type="email" id="email" class="form-input" placeholder="admin@grcflow.local" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="login-btn">
                Entrar
            </button>
        </form>

        <div class="login-footer">GRC Flow &copy; 2026 — Expansão AI</div>
    </div>

    <script>
        const apiBase = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';

        // Redirect if already logged in
        if (localStorage.getItem('grc_token')) {
            window.location.href = 'index.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('login-error');
            errorEl.style.display = 'none';
            btn.textContent = 'Entrando...';
            btn.disabled = true;

            try {
                const res = await fetch(`${apiBase}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                    }),
                });
                const data = await res.json();
                if (!res.ok || !data.success) {
                    throw new Error(data.error?.message || 'Credenciais inválidas');
                }
                localStorage.setItem('grc_token', data.data.token);
                localStorage.setItem('grc_user', JSON.stringify(data.data.user));
                window.location.href = 'index.html';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                btn.textContent = 'Entrar';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
