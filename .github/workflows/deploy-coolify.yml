name: Deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-react/package-lock.json
      - run: npm ci
      - run: npm run build

  deploy:
    name: Deploy — grcflow.expansao-ai.com.br
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Acionar deploy no Coolify
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "https://painel.expansao-ai.com.br/api/v1/deploy?uuid=jcxdguab32d5kz8mqu8ezbj8&force=false")
          echo "HTTP status: $RESPONSE"
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
            echo "Falha ao acionar deploy (HTTP $RESPONSE)"
            exit 1
          fi
          echo "Deploy acionado com sucesso"
