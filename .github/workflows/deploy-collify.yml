name: Deploy to Collify

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  # Job 1: Lint & Test Backend
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint --if-present
      
      - name: Build
        run: npm run build

  # Job 2: Test Frontend
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build --if-present

  # Job 3: Deploy to Collify (only on main branch)
  deploy:
    name: Deploy to Production
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy Backend to Collify
        env:
          COLLIFY_TOKEN: ${{ secrets.COLLIFY_TOKEN }}
          COLLIFY_APP_ID: ${{ secrets.COLLIFY_BACKEND_APP_ID }}
        run: |
          curl -X POST https://api.collify.io/deploy \
            -H "Authorization: Bearer ${{ env.COLLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id": "'${{ env.COLLIFY_APP_ID }}'",
              "branch": "main",
              "services": ["backend"]
            }'
      
      - name: Deploy Frontend to Collify
        env:
          COLLIFY_TOKEN: ${{ secrets.COLLIFY_TOKEN }}
          COLLIFY_APP_ID: ${{ secrets.COLLIFY_FRONTEND_APP_ID }}
        run: |
          curl -X POST https://api.collify.io/deploy \
            -H "Authorization: Bearer ${{ env.COLLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id": "'${{ env.COLLIFY_APP_ID }}'",
              "branch": "main",
              "services": ["frontend"]
            }'
      
      - name: Notify Deployment Success
        run: echo "✅ Deployment to Collify completed successfully"
