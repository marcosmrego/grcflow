version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: grc-flow-postgres
    environment:
      POSTGRES_DB: grc_flow
      POSTGRES_USER: grc_user
      POSTGRES_PASSWORD: grc_password_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/setup.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grc_user -d grc_flow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grc-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grc-flow-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: grc_flow
      DB_USER: grc_user
      DB_PASSWORD: grc_password_dev
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: dev-secret-key-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/node_modules:/app/node_modules
    networks:
      - grc-network
    command: npm run dev

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: grc-flow-frontend
    environment:
      VITE_API_URL: http://localhost:3000/api
      VITE_APP_URL: http://localhost
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./frontend-react/src:/app/src
      - ./frontend-react/node_modules:/app/node_modules
    networks:
      - grc-network

  # pgAdmin (Database Management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: grc-flow-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@grc-flow.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - grc-network

volumes:
  postgres_data:
    driver: local

networks:
  grc-network:
    driver: bridge

# Quick Start:
# docker-compose up -d
#
# Services:
# - Frontend: http://localhost
# - Backend API: http://localhost:3000
# - pgAdmin: http://localhost:5050
# - Database: localhost:5432
#
# Parar:
# docker-compose down
